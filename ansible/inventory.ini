# ============================================================
# EDIT BEFORE COMPETITION — fill in your actual IPs/hostnames
# ============================================================

# Linux machines (Ansible connects over SSH)
[linux]
web01   ansible_host=10.0.0.10
db01    ansible_host=10.0.0.11
mail01  ansible_host=10.0.0.12
# Add more Linux boxes here

# Windows machines (Ansible connects over WinRM)
[windows]
dc01    ansible_host=10.0.0.20
web02   ansible_host=10.0.0.21
# Add more Windows boxes here

# ============================================================
# Connection settings — Linux
# ============================================================
[linux:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/ccdc_backup
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# ============================================================
# Connection settings — Windows (WinRM)
# ============================================================
[windows:vars]
ansible_user=Administrator
ansible_password=WINDOWS_ADMIN_PASSWORD_HERE
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_port=5985
